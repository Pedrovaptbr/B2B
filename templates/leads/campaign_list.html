{% extends 'base.html' %}
{% block title %}Minhas Campanhas{% endblock %}

{% block content %}
<div class="bg-white p-6 rounded-lg shadow-md mb-6">
    <h1 class="text-2xl font-bold mb-4">Criar Nova Campanha</h1>
    <form method="POST" class="flex items-center space-x-4">
        {% csrf_token %}
        <input type="text" name="nome_campanha" placeholder="Ex: Pizzarias em Joinville" class="flex-grow p-2 border rounded-md" required>
        <button type="submit" class="px-4 py-2 font-semibold text-white bg-blue-600 rounded-md hover:bg-blue-700">Criar</button>
    </form>
</div>

<div class="bg-white p-6 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-4">Minhas Campanhas</h2>
    <div class="space-y-4">
        {% for campanha in campanhas %}
            <div class="flex items-center justify-between p-4 border rounded-md hover:bg-gray-50">
                <a href="{% url 'leads:campanha_detalhes' pk=campanha.pk %}" class="font-semibold text-blue-600">{{ campanha.nome }}</a>
                <div class="flex items-center space-x-2">
                    <a href="{% url 'leads:campaign_edit' pk=campanha.pk %}" class="text-gray-400 hover:text-blue-500"><i class="fas fa-pencil-alt"></i></a>
                    <a href="{% url 'leads:campaign_delete' pk=campanha.pk %}" class="text-gray-400 hover:text-red-500"><i class="fas fa-trash-alt"></i></a>
                </div>
            </div>
        {% empty %}
            <p class="text-gray-500">Nenhuma campanha criada ainda.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
