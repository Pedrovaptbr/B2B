{% extends 'base.html' %}

{% block title %}B2BZAP - Nova Busca{% endblock %}

{% block content %}
<style>
    .search-container {
        background: white;
        padding: 2rem;
        border-radius: 0.5rem;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        max-width: 500px;
        margin: 2rem auto;
    }
    h1 {
        font-size: 1.5rem;
        font-weight: 600;
        text-align: center;
        margin-bottom: 1.5rem;
    }
    .form-group {
        margin-bottom: 1rem;
    }
    label {
        display: block;
        font-weight: 500;
        margin-bottom: 0.5rem;
    }
    input {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border-color);
        border-radius: 0.375rem;
        box-sizing: border-box;
    }
    .btn {
        display: block;
        width: 100%;
        padding: 0.75rem;
        background-color: var(--primary-color);
        color: white;
        border: none;
        border-radius: 0.375rem;
        font-weight: 600;
        cursor: pointer;
        text-align: center;
        font-size: 1rem;
    }
    .btn:hover {
        background-color: var(--primary-hover);
    }
</style>

<div class="search-container">
    <h1>Gerador de Leads</h1>
    <form action="{% url 'leads:results' %}" method="GET">
        <div class="form-group">
            <label for="nicho">Nicho de Mercado</label>
            <input type="text" id="nicho" name="nicho" placeholder="Ex: Restaurante" required>
        </div>
        <div class="form-group">
            <label for="localizacao">Localização</label>
            <input type="text" id="localizacao" name="localizacao" placeholder="Ex: Florianópolis" required>
        </div>
        <button type="submit" class="btn">Buscar Leads</button>
    </form>
</div>
{% endblock %}
