<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}B2BZAP{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100">
    <div x-data="{ sidebarOpen: false }" class="flex h-screen bg-gray-100">
        <!-- Sidebar -->
        <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'" class="fixed inset-y-0 left-0 z-40 w-64 bg-white shadow-lg transform transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:inset-0">
            <div class="p-4 border-b h-16 flex items-center justify-center">
                <a href="{% url 'leads:campaign_list' %}" class="text-2xl font-bold text-blue-600">B2BZAP</a>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="{% url 'leads:campaign_list' %}" class="flex items-center px-4 py-2 text-gray-700 rounded-md hover:bg-gray-200"><i class="fas fa-bullhorn w-6 text-center"></i><span class="ml-3">Campanhas</span></a>
                <a href="{% url 'accounts:whatsapp_instance' %}" class="flex items-center px-4 py-2 text-gray-700 rounded-md hover:bg-gray-200"><i class="fab fa-whatsapp w-6 text-center"></i><span class="ml-3">WhatsApp</span></a>
            </nav>
            <div class="p-4 border-t">
                <a href="{% url 'accounts:logout' %}" class="flex items-center px-4 py-2 text-red-500 rounded-md hover:bg-red-100"><i class="fas fa-sign-out-alt w-6 text-center"></i><span class="ml-3">Sair</span></a>
            </div>
        </aside>

        <!-- Conteúdo Principal -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="flex items-center justify-between p-4 bg-white border-b">
                <button @click.stop="sidebarOpen = !sidebarOpen" class="relative p-2 text-gray-500 rounded-md lg:hidden z-50">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="flex-1"></div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm font-medium text-gray-600">Créditos: {{ user.perfil.creditos_disponiveis }}</span>
                </div>
            </header>
            <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-4 md:p-8">
                {% if messages %}
                    <div class="mb-4 space-y-2">
                    {% for message in messages %}
                        <div class="p-4 rounded-md {% if message.tags == 'success' %}bg-green-100 text-green-800{% elif message.tags == 'error' %}bg-red-100 text-red-800{% else %}bg-blue-100 text-blue-800{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                    </div>
                {% endif %}
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    {% block extra_js %}{% endblock %}
</body>
</html>
