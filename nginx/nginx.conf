# ── nginx.conf para VPS com SSL ───────────────────────────────────────────────
# Substitua "useb2bzap.com.br" pelo seu domínio real antes de usar.
# Após configurar, rode: sudo certbot --nginx -d useb2bzap.com.br -d www.useb2bzap.com.br

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name useb2bzap.com.br www.useb2bzap.com.br;

    # Necessário para o Certbot gerar o certificado SSL
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy para o Gunicorn rodando no Docker
server {
    listen 443 ssl;
    server_name useb2bzap.com.br www.useb2bzap.com.br;

    # Certificados gerados pelo Certbot
    ssl_certificate     /etc/letsencrypt/live/useb2bzap.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/useb2bzap.com.br/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Limite de tamanho de upload (webhook Stripe não precisa de mais que 2MB)
    client_max_body_size 2M;

    # Proxy para o Gunicorn
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
