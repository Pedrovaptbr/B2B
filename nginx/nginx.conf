# ── nginx.conf para VPS — useb2bzap.com.br ───────────────────────────────────
# Esse arquivo é HTTP-only. O certbot --nginx (rodado pelo setup-https.sh)
# adiciona o bloco HTTPS automaticamente, junto com o redirect HTTP→HTTPS.
#
# Setup manual (se precisar fora do script):
#   cp nginx/nginx.conf /etc/nginx/sites-available/b2bzap
#   ln -sf /etc/nginx/sites-available/b2bzap /etc/nginx/sites-enabled/b2bzap
#   rm -f /etc/nginx/sites-enabled/default
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d useb2bzap.com.br -d www.useb2bzap.com.br --redirect
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name useb2bzap.com.br www.useb2bzap.com.br;

    # ACME challenge para renovação do Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Limite de upload (webhook Stripe não precisa de mais que 2MB)
    client_max_body_size 2M;

    # Proxy para o Django/Gunicorn rodando no Docker
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
