services:

  # ── App Django + Gunicorn ────────────────────────────────────────────────────
  web:
    build: .
    container_name: b2bzap_app
    env_file:
      - .env
    environment:
      - DB_PATH=/data/db.sqlite3
      - MEDIA_ROOT=/data/media                  # anexos (catálogos) em pasta persistente
    ports:
      - "127.0.0.1:8000:8000"        # só localhost — nginx do host faz proxy via 443
    depends_on:
      - evolution
    restart: unless-stopped
    volumes:
      - /opt/b2bzap-data/db:/data               # banco SQLite + anexos (/data/media) em pasta visível

  # ── Evolution API (WhatsApp) ─────────────────────────────────────────────────
  evolution:
    image: atendai/evolution-api:v1.5.4
    container_name: b2bzap_evolution
    ports:
      - "127.0.0.1:8081:8080"   # só localhost
    environment:
      # Chave global de autenticação — deve bater com EVOLUTION_API_KEY do .env
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-b2bkey}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      # Armazenamento local (sem banco externo)
      - DATABASE_ENABLED=false
      - STORE_MESSAGES=true
      - STORE_MESSAGE_UP=true
      - STORE_CONTACTS=true
      - STORE_CHATS=true
      - DEL_INSTANCE=false
    volumes:
      - /opt/b2bzap-data/evolution:/evolution/store   # sessões WhatsApp em pasta visível
    restart: unless-stopped
